serenity {
  take.screenshots = AFTER_EACH_STEP

  webdriver {
    driver = chrome
    autodownload = true
  }

  chrome {
    switches = [
      "--headless",
      "--no-sandbox",
      "--disable-dev-shm-usage",
      "--disable-gpu",
      "--window-size=1920,1080",
      "--disable-save-password-bubble",
      "--disable-extensions",
      "--disable-popup-blocking",
      "--disable-notifications",
      "--no-first-run",
      "--disable-infobars",
      "--disable-plugins-discovery",
      "--disable-translate",
      "--disable-features=AutofillServerCommunication,AutofillCreditCardSavePrompt,AutofillAddressSavePrompt,PasswordManagerOnboarding",
      "--disable-blink-features=AutomationControlled",
      "--remote-allow-origins=*"
    ]
  }
}